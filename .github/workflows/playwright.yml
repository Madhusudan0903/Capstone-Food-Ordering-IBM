name: Playwright Tests & Allure Report

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "playwright-allure-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard_index: [1, 2, 3]

    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            automation/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install automation dependencies
        working-directory: automation
        run: npm ci

      - name: Start backend
        working-directory: backend
        run: npm run dev > backend.log 2>&1 &

      - name: Set backend URL for frontend
        run: echo "VITE_API_URL=http://localhost:5000" >> frontend/.env

      - name: Start frontend
        working-directory: frontend
        run: npm run dev > frontend.log 2>&1 &

      - name: Wait for backend and frontend
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:5000 >/dev/null 2>&1; then
              echo "Backend is up"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Backend did not start in time"
              exit 1
            fi
            sleep 2
          done
          for i in {1..60}; do
            if curl -sSf http://localhost:5173 >/dev/null 2>&1; then
              echo "Frontend is up"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Frontend did not start in time"
              exit 1
            fi
            sleep 2
          done

      - name: Install Playwright browsers
        working-directory: automation
        run: npx playwright install --with-deps

      - name: Run Playwright tests (sharded)
        working-directory: automation
        run: npx playwright test --shard=${{ matrix.shard_index }}/3
        continue-on-error: true

      - name: Print backend logs (on failure)
        if: failure()
        run: cat backend/backend.log || true

      - name: Print frontend logs (on failure)
        if: failure()
        run: cat frontend/frontend.log || true

      - name: Upload allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-shard-${{ matrix.shard_index }}
          path: automation/allure-results
          if-no-files-found: warn
          retention-days: 3

  report:
    name: Generate Allure report
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: automation/package-lock.json

      - name: Setup Java (required by Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install automation dependencies
        working-directory: automation
        run: npm ci

      - name: Download allure results from all shards
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-shard-*
          merge-multiple: true
          path: automation/allure-results

      - name: Generate Allure report
        working-directory: automation
        run: npx allure generate allure-results -o allure-report --clean

      - name: Upload Allure HTML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: automation/allure-report
          if-no-files-found: warn
          retention-days: 14

      - name: Upload report for GitHub Pages
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
        uses: actions/upload-pages-artifact@v3
        with:
          path: automation/allure-report

  deploy:
    name: Deploy report to GitHub Pages
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
    runs-on: ubuntu-latest
    needs: [report]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
