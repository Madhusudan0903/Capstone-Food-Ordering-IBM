name: Playwright Tests & Allure Report

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# =========================
# 🧪 TEST JOB (SHARDED)
# =========================
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard_index: [1, 2, 3] # 3 parallel machines

    env:
      CI: true

    steps:
      - uses: actions/checkout@v4

      # ✅ Node + Cache (BIG SPEED BOOST)
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            automation/package-lock.json

      # -------------------------
      # BACKEND
      # -------------------------
      - working-directory: backend
        run: npm ci

      - working-directory: backend
        run: npm run dev &

      # -------------------------
      # FRONTEND
      # -------------------------
      - working-directory: frontend
        run: npm ci

      - working-directory: frontend
        run: npm run dev &

      # -------------------------
      # WAIT (IMPORTANT)
      # -------------------------
      - run: npx wait-on http://localhost:5173

      # -------------------------
      # AUTOMATION
      # -------------------------
      - working-directory: automation
        run: npm ci

      # ✅ Install browsers ONCE per shard
      - working-directory: automation
        run: npx playwright install --with-deps

      # ✅ SHARD EXECUTION
      - name: Run Playwright Tests (Shard)
        working-directory: automation
        run: |
          npx playwright test \
          --shard=${{ matrix.shard_index }}/3
        continue-on-error: true

      # ✅ Upload results per shard
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shard_index }}
          path: automation/allure-results
          retention-days: 1

  # =========================
  # 📊 REPORT JOB
  # =========================
  report:
    if: always()
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: automation/package-lock.json

      - working-directory: automation
        run: npm ci

      # ✅ Merge all shard results
      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          path: automation/allure-results
          pattern: allure-results-*
          merge-multiple: true

      # ✅ Generate report
      - name: Generate Allure Report
        working-directory: automation
        run: npx allure generate allure-results -o allure-report

      # ✅ Upload report artifact
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: automation/allure-report
          retention-days: 14

      # ✅ Deploy
      - name: Deploy to GitHub Pages
        if: github.ref_name == 'main' || github.ref_name == 'master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: automation/allure-report
