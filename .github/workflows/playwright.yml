name: Playwright Tests & Allure Report

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-and-report:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # -------------------------
      # ✅ BACKEND SETUP
      # -------------------------
      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Start Backend
        working-directory: backend
        run: npm run dev &

      # -------------------------
      # ✅ FRONTEND SETUP
      # -------------------------
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Start Frontend
        working-directory: frontend
        run: npm run dev &

      # -------------------------
      # ✅ WAIT FOR APP
      # -------------------------
      - name: Wait for Frontend
        run: npx wait-on http://localhost:5173

      # ✅ FIX 1: Run inside automation folder
      - name: Install Dependencies
        working-directory: automation
        run: npm ci

      # ✅ FIX 2: Install Playwright browsers
      - name: Install Playwright Browsers
        working-directory: automation
        run: npx playwright install --with-deps

      # ✅ FIX 3: Run tests from automation
      - name: Run Playwright Tests
        working-directory: automation
        run: npx playwright test
        continue-on-error: true

      # ✅ FIX 4: Install Allure CLI (REQUIRED)
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # ✅ FIX 5: Generate report from correct folder
      - name: Generate Allure Report
        if: always()
        working-directory: automation
        run: allure generate allure-results --clean -o allure-report

      # ✅ FIX 6: Deploy correct folder
      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: automation/allure-report
